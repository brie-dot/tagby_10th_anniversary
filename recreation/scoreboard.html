<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAGby 10주년 점수판</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #dbeafe 0, transparent 40%),
                  linear-gradient(135deg, #ffffff 0%, #eef4ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 48px;
    }

    /* ── 헤더 ── */
    .header { text-align: center; }
    .header-label {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .header-title {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 950;
      letter-spacing: -0.05em;
      color: #111827;
    }

    /* ── 시상대 ── */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: 860px;
    }

    /* 순위별 카드 높이 */
    .podium-slot { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .podium-slot.rank-1 { order: 2; }
    .podium-slot.rank-2 { order: 1; }
    .podium-slot.rank-3 { order: 3; }

    /* ── 플립 카드 ── */
    .flip-card {
      width: 100%;
      cursor: pointer;
      perspective: 1000px;
      margin-bottom: 14px;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

    .card-front, .card-back {
      width: 100%;
      border-radius: 24px;
      padding: 28px 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 180px;
    }
    .card-back { position: absolute; top: 0; left: 0; transform: rotateY(180deg); }

    /* 앞면 */
    .card-front {
      background: #fff;
      border: 2px solid #e5e7eb;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }
    .rank-1 .card-front { border-color: #fbbf24; box-shadow: 0 8px 30px rgba(251,191,36,0.2); }
    .rank-2 .card-front { border-color: #9ca3af; box-shadow: 0 8px 30px rgba(156,163,175,0.2); }
    .rank-3 .card-front { border-color: #d97706; box-shadow: 0 8px 30px rgba(217,119,6,0.15); }

    .card-rank-emoji { font-size: 48px; line-height: 1; }
    .card-team-name {
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 900;
      color: #111827;
      text-align: center;
      word-break: keep-all;
    }
    .card-hint {
      font-size: 13px;
      font-weight: 700;
      color: #9ca3af;
    }

    /* 뒷면 */
    .card-back {
      background: #111827;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .rank-1 .card-back { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .rank-2 .card-back { background: linear-gradient(135deg, #6b7280, #9ca3af); }
    .rank-3 .card-back { background: linear-gradient(135deg, #b45309, #d97706); }

    .card-back-team {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 900;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }
    .card-back-score {
      font-size: clamp(56px, 8vw, 96px);
      font-weight: 950;
      color: #fff;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .card-back-label {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    /* ── 시상대 받침대 ── */
    .podium-base {
      width: 100%;
      border-radius: 16px 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 950;
      color: rgba(255,255,255,0.9);
    }
    .rank-1 .podium-base { height: 100px; background: linear-gradient(180deg, #fbbf24, #f59e0b); }
    .rank-2 .podium-base { height: 70px;  background: linear-gradient(180deg, #9ca3af, #6b7280); }
    .rank-3 .podium-base { height: 50px;  background: linear-gradient(180deg, #d97706, #b45309); }

    /* ── 새로고침 버튼 ── */
    .refresh-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 700;
    }
    .refresh-btn {
      padding: 10px 20px;
      border: 0;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, background 0.15s;
    }
    .refresh-btn:hover { background: #e5e7eb; transform: translateY(-1px); }
    .refresh-btn.spinning { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 로딩 / 에러 ── */
    .status-msg {
      font-size: 18px;
      font-weight: 700;
      color: #6b7280;
      text-align: center;
    }
    .error-msg { color: #dc2626; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-label">SCORE BOARD</div>
    <div class="header-title">🏆 실시간 점수판</div>
  </div>

  <div id="podium" class="podium">
    <div class="status-msg" style="width:100%">⏳ 점수를 불러오는 중...</div>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" id="refreshBtn" onclick="reload()">↻ 새로고침</button>
    <span id="lastUpdated"></span>
  </div>

  <script>
    const SCORE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpMTMpqFtQVyu9efUUp10kRvpQMza3Ur9JxVkqWfb_7JFLYmQGogHznVf9s3NpeJa9QMPjfGX3HTPH/pub?gid=355034406&single=true&output=csv";
    const PROXIES = [
      url => url,
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];
    const RANK_EMOJI  = { 1: "🥇", 2: "🥈", 3: "🥉" };
    const RANK_LABEL  = { 1: "1위", 2: "2위", 3: "3위" };
    const RANK_CLS    = { 1: "rank-1", 2: "rank-2", 3: "rank-3" };

    // 카드 뒤집힘 상태 유지 (새로고침해도 유지)
    const flipped = {};

    async function tryFetch(url) {
      const r = await fetch(url, { cache: "no-cache" });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const t = await r.text();
      if (!t?.trim()) throw new Error("empty");
      return t;
    }

    async function loadWithFallback() {
      for (const make of PROXIES) {
        try { return await tryFetch(make(SCORE_URL)); } catch {}
      }
      throw new Error("failed");
    }

    function parseCSV(text) {
      return text.trim().split("\n").map(line => {
        const cells = [];
        let cell = "", inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"' && inQ && line[i+1] === '"') { cell += '"'; i++; }
          else if (ch === '"') inQ = !inQ;
          else if (ch === ',' && !inQ) { cells.push(cell.trim()); cell = ""; }
          else cell += ch;
        }
        cells.push(cell.trim());
        return cells;
      }).filter(r => r[0]);
    }

    function renderPodium(top3) {
      const podium = document.getElementById("podium");
      podium.innerHTML = top3.map((team, i) => {
        const r   = team.rank;
        const cls = RANK_CLS[r]  || "rank-3";
        const lbl = RANK_LABEL[r] || r + "위";
        const emo = RANK_EMOJI[r] || r + "위";
        return `
          <div class="podium-slot ${cls}">
            <div class="flip-card ${flipped[i] ? "flipped" : ""}" onclick="toggleFlip(${i})" id="card-${i}">
              <div class="flip-card-inner">
                <div class="card-front">
                  <div class="card-rank-emoji">${emo}</div>
                  <div class="card-team-name">${team.name}</div>
                  <div class="card-hint">눌러서 점수 공개</div>
                </div>
                <div class="card-back">
                  <div class="card-back-team">${team.name}</div>
                  <div class="card-back-score">${team.score}</div>
                  <div class="card-back-label">점</div>
                </div>
              </div>
            </div>
            <div class="podium-base">${lbl}</div>
          </div>`;
      }).join("");
    }

    function toggleFlip(i) {
      flipped[i] = !flipped[i];
      const card = document.getElementById(`card-${i}`);
      card.classList.toggle("flipped", flipped[i]);
    }

    async function reload() {
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("spinning");
      setTimeout(() => btn.classList.remove("spinning"), 600);

      try {
        const csv  = await loadWithFallback();
        const rows = parseCSV(csv);

        // 헤더 감지 후 데이터 파싱
        const hasHeader = isNaN(rows[0]?.[1]);
        const body = hasHeader ? rows.slice(1) : rows;

        const sorted = body
          .filter(r => r[0] && r[1] !== undefined)
          .map(r => {
            const raw  = r[0].trim();
            const name = raw.endsWith("팀") ? raw : raw + "팀";
            return { name, score: Number(r[1]) || 0 };
          })
          .sort((a, b) => b.score - a.score);

        // 동점 처리: 같은 점수 → 같은 순위, 다음 순위 건너뜀
        let rank = 1;
        sorted.forEach((t, i) => {
          if (i > 0 && t.score < sorted[i - 1].score) rank = i + 1;
          t.rank = rank;
        });

        // 상위 3순위까지만 표시 (동점으로 3명 이상일 수 있음)
        const top3 = sorted.filter(t => t.rank <= 3);

        if (!top3.length) throw new Error("no data");

        renderPodium(top3);

        const now = new Date();
        document.getElementById("lastUpdated").textContent =
          `마지막 업데이트 ${now.getHours().toString().padStart(2,"0")}:${now.getMinutes().toString().padStart(2,"0")}`;

      } catch {
        document.getElementById("podium").innerHTML =
          `<div class="status-msg error-msg">❌ 데이터를 불러오지 못했어요.<br>구글 시트가 웹에 게시된 상태인지 확인해주세요.</div>`;
      }
    }

    reload();
  </script>
</body>
</html>
